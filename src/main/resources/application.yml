spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 30000
      max-lifetime: 300000
      leak-detection-threshold: 2000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    # Skip validation of applied migrations (checksum mismatch V24, V25). Migrations already applied - migrate() won't re-run them.
    # Re-enable after running: flyway repair (or fix schema history manually) to restore checksums.
    validate-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS:true}

mybatis:
  mapper-locations: classpath*:mybatis/**/*.xml

app:
  # CORS: use * for dev/staging (allow all). Set CORS_ALLOWED_ORIGINS to restrict in prod.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  jwt:
    hmacSecret: ${JWT_HMAC_SECRET}
    accessTtlSeconds: 86400  # 1 day
  invite:
    base-url: ${INVITE_BASE_URL:https://fe-sme.vercel.app}
    token-ttl-hours: ${INVITE_TOKEN_TTL_HOURS:72}
  identity:
    bulk-user-import:
      enabled: ${BULK_USER_IMPORT_ENABLED:false}
      max-rows: ${BULK_USER_IMPORT_MAX_ROWS:500}
      max-file-size-bytes: ${BULK_USER_IMPORT_MAX_FILE_SIZE_BYTES:2097152}
  # payment gateway: stripe | mock (default stripe for real payments; set mock for local dev)
  payment:
    gateway: ${PAYMENT_GATEWAY:stripe}
  # e-invoice provider: mock (replace with real provider when integrating)
  einvoice:
    provider: ${EINVOICE_PROVIDER:mock}
  billing:
    # When true, paid plans cannot use gated operations while an ISSUED invoice is overdue or falls in the current subscription period.
    require-paid-for-operations: ${BILLING_REQUIRE_PAID:true}
    recurring-invoice:
      # cron: 1st day of month at 00:00
      cron: ${RECURRING_INVOICE_CRON:0 0 1 1 * *}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  platform:
    admin-password: ${PLATFORM_ADMIN_PASSWORD:Admin@123}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

google:
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY}

logging:
  level:
    org.apache.ibatis: INFO
    org.mybatis: INFO

server:
  port: ${PORT:8080}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-5.4-mini